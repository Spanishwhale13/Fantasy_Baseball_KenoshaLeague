<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KTown Reloaded — Fantasy Baseball</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Special+Elite&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e8;
      --tan:   #e8dfc8;
      --brown: #8b6914;
      --dark-brown: #4a3208;
      --red:   #c0392b;
      --dark-red: #7b1c13;
      --navy:  #1a2744;
      --gold:  #d4a017;
      --ink:   #1c1208;
      --muted: #6b5a3e;
      --green: #1a6b3a;
      --light-green: #e8f5e9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Oswald', sans-serif;
      background: #2a2a2a;
      color: var(--ink);
      min-height: 100vh;
      padding: 20px 1.5%;
    }
    .page { max-width: 96%; margin: 0 auto; }

    /* ── MASTHEAD ── */
    .masthead {
      text-align: center; padding: 20px 16px 12px;
      background: var(--navy); border-radius: 10px 10px 0 0;
      border: 3px solid var(--gold); border-bottom: none;
      position: relative; overflow: hidden;
    }
    .masthead::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 24px,
        rgba(255,255,255,0.03) 24px, rgba(255,255,255,0.03) 25px);
    }
    .masthead-eyebrow { font-family: 'Special Elite', cursive; font-size: 13px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 4px; position: relative; }
    .masthead-title   { font-family: 'DM Serif Display', serif; font-size: 46px; color: #fff; line-height: 1; letter-spacing: 1px; position: relative; }
    .masthead-sub     { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 3px; margin-top: 6px; font-family: 'Special Elite', cursive; position: relative; }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      background: var(--dark-brown);
      border-left: 3px solid var(--gold);
      border-right: 3px solid var(--gold);
    }
    .tab-btn {
      flex: 1; padding: 10px 8px;
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 2px; color: rgba(255,255,255,0.45);
      background: none; border: none; border-bottom: 3px solid transparent;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
      text-transform: uppercase;
    }
    .tab-btn:hover  { color: rgba(255,255,255,0.75); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── STATUS ── */
    .status-panel {
      background: var(--cream); border: 3px solid var(--gold); border-top: none;
      border-radius: 0 0 10px 10px; padding: 32px 24px; text-align: center;
    }
    .status-msg { font-family: 'Special Elite', cursive; font-size: 16px; color: var(--muted); line-height: 1.8; }
    .status-msg.error { color: var(--dark-red); }
    .retry-btn {
      margin-top: 16px; background: var(--navy); color: #fff;
      font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 2px; padding: 10px 24px; border: 2px solid var(--gold);
      border-radius: 6px; cursor: pointer; display: inline-block;
    }
    code {
      font-family: monospace; background: #fff3cd; border: 1px solid var(--tan);
      padding: 2px 8px; border-radius: 3px; font-size: 12px; color: var(--dark-brown);
      display: inline-block; margin: 2px 0;
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      background: var(--cream); border: 3px solid var(--gold); border-top: none;
      border-radius: 0 0 10px 10px; overflow: hidden; display: none;
    }

    /* ── WEEK NAV ── */
    .week-nav {
      background: var(--tan); border-bottom: 2px solid var(--gold);
      padding: 8px 16px; display: flex; align-items: center; gap: 10px;
    }
    .week-nav-btn {
      background: var(--navy); color: var(--gold); border: 1.5px solid var(--gold);
      font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700;
      padding: 4px 14px; border-radius: 4px; cursor: pointer; letter-spacing: 1px;
      transition: opacity 0.15s;
    }
    .week-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .week-nav-label {
      flex: 1; text-align: center; font-family: 'Special Elite', cursive;
      font-size: 15px; color: var(--dark-brown); letter-spacing: 1px;
    }
    .week-live-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      background: var(--red); color: #fff; padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase;
    }

    /* ── MATCHUP CARDS — TWO COLUMN GRID ── */
    .matchup-list {
      padding: 12px 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (max-width: 560px) {
      .matchup-list { grid-template-columns: 1fr; }
    }

    .matchup-card { background: #fff; border: 1.5px solid var(--tan); border-radius: 6px; overflow: hidden; position: relative; }
    .matchup-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--navy); }
    .matchup-inner { padding: 10px 14px 10px 18px; }
    .team-row { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 5px 0; }
    .team-row + .team-row { border-top: 1px dashed var(--tan); }
    .team-name   { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-record { font-family: 'Special Elite', cursive; font-size: 12px; color: var(--muted); margin-top: 1px; }
    .team-score  { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); min-width: 70px; text-align: right; line-height: 1; }
    .team-score.winning { color: var(--dark-red); }
    .team-score.losing  { color: var(--muted); }
    .matchup-divider { display: flex; align-items: center; padding: 2px 0; gap: 8px; }
    .vs-badge { font-family: 'Special Elite', cursive; font-size: 12px; color: var(--muted); letter-spacing: 1px; background: var(--tan); padding: 1px 6px; border-radius: 3px; }
    .matchup-status-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 2px 7px; border-radius: 3px; text-transform: uppercase;
      display: inline-block;
    }
    .badge-final { background: #e8f5e9; color: var(--green); border: 1px solid #a5d6a7; }
    .badge-live  { background: #fdecea; color: var(--dark-red); border: 1px solid #f5c6c3; }

    /* ── SHARED TABLE STYLES ── */
    .section-block { padding: 16px; }
    .section-title {
      font-family: 'Special Elite', cursive; font-size: 13px; color: var(--muted);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--tan);
      display: flex; align-items: center; gap: 8px;
    }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); text-align: right; padding: 8px 12px;
      border-bottom: 2px solid var(--tan); white-space: nowrap;
    }
    .data-table th:first-child  { text-align: left; width: 28px; }
    .data-table th:nth-child(2) { text-align: left; }
    .data-table td {
      padding: 11px 12px; font-size: 15px; color: var(--ink);
      border-bottom: 1px solid var(--tan); text-align: right;
    }
    .data-table td:first-child  { text-align: center; font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--gold); }
    .data-table td:nth-child(2) { text-align: left; font-size: 16px; font-weight: 700; color: var(--navy); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(212,160,23,0.05); }
    .data-table tr.winner-row td { background: rgba(26,107,58,0.06); }
    .data-table tr.winner-row td:nth-child(2) { color: var(--green); }

    .rec  { font-family: 'Special Elite', cursive; font-size: 14px; }
    .pts  { font-family: 'DM Serif Display', serif; font-size: 17px; }
    .pct  { font-size: 14px; color: var(--muted); font-family: 'Special Elite', cursive; }
    .diff { font-size: 14px; font-family: 'Special Elite', cursive; }
    .pos  { color: var(--green); }
    .neg  { color: var(--dark-red); }
    .table-divider td { background: var(--tan); height: 2px; padding: 0; border: none; }

    /* ── SEGMENT BLOCKS ── */
    .segment-grid { display: flex; flex-direction: column; gap: 0; }
    .segment-block { border-top: 2px solid var(--gold); }
    .segment-block:first-child { border-top: none; }
    .segment-header {
      background: var(--navy); padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .segment-label { font-family: 'Special Elite', cursive; font-size: 14px; color: var(--gold); letter-spacing: 2px; }
    .segment-weeks { font-size: 12px; color: rgba(255,255,255,0.45); font-family: 'Special Elite', cursive; letter-spacing: 1px; }
    .segment-winner-crown { font-size: 12px; color: var(--gold); letter-spacing: 1px; font-family: 'Special Elite', cursive; }
    .segment-table-wrap { padding: 0 16px 12px; }
    .segment-incomplete { font-family: 'Special Elite', cursive; font-size: 14px; color: var(--muted); padding: 12px 0; text-align: center; }

    /* ── BOTTOM STRIP ── */
    .bottom-strip {
      background: var(--navy); padding: 8px 20px;
      display: flex; gap: 16px; overflow-x: auto;
      border-top: 2px solid var(--gold);
    }
    .strip-item { display: flex; flex-direction: column; align-items: center; min-width: 58px; }
    .strip-rank   { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--gold); line-height: 1; }
    .strip-name   { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-align: center; margin-top: 2px; font-family: 'Special Elite', cursive; }
    .strip-record { font-size: 12px; color: rgba(255,255,255,0.4); font-family: 'Special Elite', cursive; }

    /* ── MLB GAME CARDS ── */
    .mlb-game-card {
      background: #fff; border: 1.5px solid var(--tan); border-radius: 6px;
      position: relative;
    }
    .mlb-game-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--red); border-radius: 6px 0 0 6px;
    }
    .mlb-game-card.live-game::before  { background: var(--green); }
    .mlb-game-card.final-game::before { background: var(--muted); }

    .mlb-game-header {
      padding: 6px 10px 6px 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .mlb-game-header:hover { background: rgba(212,160,23,0.04); }
    .mlb-teams { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
    .mlb-team-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px; }
    .mlb-team-name {
      font-size: 13px; font-weight: 700; color: var(--navy); letter-spacing: 0.2px;
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mlb-team-name .arrow { font-size: 11px; color: var(--red); flex-shrink: 0; }
    .mlb-team-score {
      font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink);
      min-width: 26px; text-align: right; line-height: 1;
    }
    .mlb-team-score.winning { color: var(--dark-red); }
    .mlb-team-score.losing  { color: var(--muted); }
    .mlb-divider { height: 1px; background: var(--tan); margin: 2px 0; }

    .mlb-status-area {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding-left: 6px; flex-shrink: 0;
    }
    .mlb-inning-badge {
      font-family: 'Special Elite', cursive; font-size: 11px; color: var(--muted);
      letter-spacing: 1px; text-align: center; white-space: nowrap;
    }
    .mlb-inning-badge.live { color: var(--green); font-weight: bold; }

    /* Diamond — slightly smaller for 4-col */
    .mlb-diamond { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
    .mlb-diamond svg { width: 28px; height: 28px; }

    /* Count + Outs */
    .mlb-count-outs {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-family: 'Special Elite', cursive; font-size: 9px; color: var(--muted);
    }
    .mlb-count-row { display: flex; gap: 2px; align-items: center; }
    .mlb-dot {
      width: 7px; height: 7px; border-radius: 50%;
      border: 1.5px solid var(--muted); background: transparent; display: inline-block;
    }
    .mlb-dot.on     { background: var(--gold);     border-color: var(--gold); }
    .mlb-dot.out-on { background: var(--dark-red);  border-color: var(--dark-red); }
    .mlb-count-label { font-size: 9px; margin-right: 1px; }

    /* At-bat strip */
    .mlb-atbat-strip {
      padding: 3px 8px 3px 14px;
      background: #fafaf6; border-top: 1px solid var(--tan);
      display: flex; flex-direction: column; gap: 2px;
    }
    .mlb-atbat-row { display: flex; align-items: baseline; gap: 4px; }
    .mlb-player-label { font-size: 10px; color: var(--muted); font-family: 'Special Elite', cursive; letter-spacing: 1px; flex-shrink: 0; }
    .mlb-player-name  { font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .mlb-roster-tag {
      display: inline-block; font-size: 9px; font-family: 'Special Elite', cursive;
      letter-spacing: 0.5px; background: var(--navy); color: var(--gold);
      border: 1px solid var(--gold); border-radius: 3px;
      padding: 1px 3px; margin-left: 3px; white-space: nowrap;
      vertical-align: middle; flex-shrink: 0;
    }

    /* Pitch log */
    .mlb-pitch-log-wrap { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .mlb-pitch-log-wrap.open { max-height: 1200px; }
    .mlb-pitch-log {
      padding: 6px 10px 10px 14px; border-top: 1px solid var(--tan);
      display: flex; flex-direction: column; gap: 2px;
    }
    .mlb-pitch-log-title {
      font-family: 'Special Elite', cursive; font-size: 11px; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
      border-bottom: 1px solid var(--tan); padding-bottom: 3px;
    }
    .mlb-pitch-entry {
      display: grid; grid-template-columns: 22px 1fr auto auto;
      gap: 3px 6px; align-items: center; font-size: 12px; padding: 2px 0;
      border-bottom: 1px dashed rgba(139,105,20,0.1);
    }
    .mlb-pitch-entry:last-child { border-bottom: none; }
    .mlb-pitch-num   { font-family: 'DM Serif Display', serif; font-size: 14px; color: var(--gold); text-align: center; }
    .mlb-pitch-desc  { color: var(--ink); }
    .mlb-pitch-count { font-family: 'Special Elite', cursive; font-size: 11px; color: var(--muted); text-align: right; }
    .mlb-pitch-speed { font-size: 11px; color: var(--muted); text-align: right; font-family: 'Special Elite', cursive; }
    .tag-strike { color: var(--dark-red); font-weight: bold; }
    .tag-ball   { color: var(--green);    font-weight: bold; }
    .tag-hit    { color: var(--brown);    font-weight: bold; }
    .tag-out    { color: var(--muted); }

    .mlb-no-games {
      grid-column: 1 / -1; text-align: center; padding: 32px;
      font-family: 'Special Elite', cursive; color: var(--muted); font-size: 14px;
    }
    .mlb-expand-hint {
      font-size: 10px; color: var(--muted); font-family: 'Special Elite', cursive;
      letter-spacing: 1px; text-align: right; padding: 0 8px 3px; cursor: pointer;
    }

    /* ── MLB LIVE PAGE LAYOUT: 4-col games | matchup panel ── */
    .mlb-live-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
      align-items: start;
    }
    .mlb-live-left  { min-width: 0; }
    .mlb-live-right {
      border-left: 2px solid var(--gold);
      background: var(--cream);
      min-height: 200px;
      position: sticky;
      top: 0;
      overflow-y: auto;
      max-height: 92vh;
    }

    /* ── MATCHUP PANEL HEADER ── */
    .fmatch-header {
      background: var(--navy);
      padding: 8px 12px 10px;
      border-bottom: 2px solid var(--gold);
      text-align: center;
    }
    .fmatch-title {
      font-family: 'Special Elite', cursive;
      font-size: 10px; color: var(--gold);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .fmatch-score-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .fmatch-score-team {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      min-width: 0; flex: 1;
    }
    .fmatch-team-name {
      font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.7); letter-spacing: 0.5px; text-transform: uppercase;
      white-space: normal; word-break: break-word;
      text-align: center; line-height: 1.2;
    }
    .fmatch-score {
      font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1;
    }
    .fmatch-score.winning { color: var(--gold); }
    .fmatch-score.losing  { color: rgba(255,255,255,0.35); }
    .fmatch-score.tied    { color: rgba(255,255,255,0.7); }
    .fmatch-vs {
      font-family: 'Special Elite', cursive; font-size: 12px;
      color: rgba(255,255,255,0.3); flex-shrink: 0;
    }

    /* ── MATCHUP TWO-COL ROSTER ── */
    .fmatch-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .fmatch-col { padding: 0 0 6px; }
    .fmatch-col + .fmatch-col { border-left: 1px solid var(--tan); }

    .fmatch-col-header {
      font-family: 'Special Elite', cursive; font-size: 10px;
      letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase;
      padding: 5px 6px 4px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      border-bottom: 1px solid var(--tan);
      background: rgba(212,160,23,0.06);
      text-align: center;
    }
    .fmatch-col-today {
      color: var(--green); font-size: 10px; font-weight: 700;
      font-family: 'Oswald', sans-serif; letter-spacing: 0;
    }

    .fmatch-player-row-2col {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      padding: 4px 6px;
      border-bottom: 1px solid rgba(139,105,20,0.10);
      gap: 0 3px;
    }
    .fmatch-player-row-2col:last-child { border-bottom: none; }
    .fmatch-player-row-2col:hover { background: rgba(212,160,23,0.05); }

    .fmatch-pos {
      font-family: 'Special Elite', cursive; font-size: 9px;
      color: var(--muted); text-align: center; letter-spacing: 0.5px;
    }
    .fmatch-pname {
      font-weight: 700; color: var(--navy);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: 11px;
    }
    .fmatch-pname.playing { color: var(--green); }
    .fmatch-ppts {
      font-family: 'DM Serif Display', serif; font-size: 13px;
      text-align: right; min-width: 28px;
    }
    .fmatch-ppts.positive { color: var(--dark-red); }
    .fmatch-ppts.zero     { color: var(--muted); }

    .fmatch-loading {
      font-family: 'Special Elite', cursive; font-size: 13px;
      color: var(--muted); text-align: center; padding: 24px 12px;
    }

    /* ── MINI MATCHUP STRIP ── */
    #mini-matchup-strip {
      background: var(--dark-brown);
      border-bottom: 2px solid var(--gold);
      padding: 0 8px;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #mini-matchup-strip::-webkit-scrollbar { display: none; }

    .mini-matchup {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 5px 10px;
      cursor: pointer;
      border-right: 1px solid rgba(212,160,23,0.2);
      transition: background 0.15s;
      flex-shrink: 0;
      position: relative;
    }
    .mini-matchup:last-child { border-right: none; }
    .mini-matchup:hover { background: rgba(212,160,23,0.1); }
    .mini-matchup.active {
      background: rgba(212,160,23,0.18);
    }
    .mini-matchup.active::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0; height: 2px;
      background: var(--gold);
    }
    .mini-team {
      display: flex; flex-direction: column; align-items: center;
      min-width: 38px;
    }
    .mini-abbrev {
      font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.75); letter-spacing: 1px; text-transform: uppercase;
    }
    .mini-score {
      font-family: 'DM Serif Display', serif; font-size: 17px; line-height: 1;
      color: rgba(255,255,255,0.5);
    }
    .mini-score.winning { color: var(--gold); }
    .mini-score.losing  { color: rgba(255,255,255,0.3); }
    .mini-vs {
      font-family: 'Special Elite', cursive; font-size: 9px;
      color: rgba(255,255,255,0.25); padding: 0 5px; margin-top: 8px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .mlb-live-layout { grid-template-columns: 1fr 320px; }
    }
    @media (max-width: 900px) {
      .mlb-live-layout { grid-template-columns: 1fr 280px; }
      #mlb-game-list { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 700px) {
      .mlb-live-layout { grid-template-columns: 1fr; }
      .mlb-live-right { border-left: none; border-top: 2px solid var(--gold); max-height: none; }
      #mlb-game-list { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 420px) {
      #mlb-game-list { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="masthead">
    <div class="masthead-eyebrow">★ Official Scorecard ★</div>
    <div class="masthead-title">Fantasy Baseball</div>
    <div class="masthead-sub" id="league-name">KTown Reloaded</div>
  </div>

  <div class="tab-bar" id="tab-bar" style="display:none">
    <button class="tab-btn active" onclick="switchTab('scoreboard')">⚾ Scoreboard</button>
    <button class="tab-btn"        onclick="switchTab('standings')">📊 Standings</button>
    <button class="tab-btn"        onclick="switchTab('segments')">🏆 Segments</button>
    <button class="tab-btn"        onclick="switchTab('mlblive')">📡 MLB Live</button>
  </div>

  <div class="status-panel" id="status-panel">
    <div class="status-msg" id="status-msg">Connecting to proxy...</div>
  </div>

  <div class="main-content" id="main-content">

    <!-- ── SCOREBOARD ── -->
    <div id="tab-scoreboard">
      <div class="week-nav">
        <button class="week-nav-btn" id="btn-prev" onclick="changeWeek(-1)">◀ PREV</button>
        <div class="week-nav-label" id="week-nav-label">Week 1</div>
        <span class="week-live-badge" id="live-badge" style="display:none">LIVE</span>
        <button class="week-nav-btn" id="btn-next" onclick="changeWeek(1)">NEXT ▶</button>
      </div>
      <div class="matchup-list" id="matchup-list"></div>
      <div class="bottom-strip" id="bottom-strip"></div>
    </div>

    <!-- ── STANDINGS ── -->
    <div id="tab-standings" style="display:none">
      <div class="section-block">
        <div class="section-title">Season Standings</div>
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th><th>Team</th>
              <th>W</th><th>L</th><th>PCT</th>
              <th>PF</th><th>PA</th><th>DIFF</th>
            </tr>
          </thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
      <div class="bottom-strip" id="bottom-strip-2"></div>
    </div>

    <!-- ── SEGMENTS ── -->
    <div id="tab-segments" style="display:none">
      <div class="segment-grid" id="segment-grid"></div>
      <div class="bottom-strip" id="bottom-strip-3"></div>
    </div>

    <!-- ── MLB LIVE ── -->
    <div id="tab-mlblive" style="display:none">
      <div class="week-nav" style="justify-content:space-between">
        <span class="week-nav-label" style="flex:0;white-space:nowrap;font-size:12px" id="mlb-date-label">Today's Games</span>
        <span class="week-live-badge" id="mlb-live-badge" style="display:none">LIVE</span>
        <button class="week-nav-btn" onclick="refreshMlb()" style="padding:4px 12px">↻ REFRESH</button>
      </div>
      <!-- ── MINI MATCHUP STRIP ── -->
      <div id="mini-matchup-strip" style="display:none"></div>
      <div class="mlb-live-layout">
        <div class="mlb-live-left">
          <!-- 4-column game grid -->
          <div id="mlb-game-list" style="padding:10px 12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:start"></div>
        </div>
        <div class="mlb-live-right">
          <div id="fantasy-matchup-panel">
            <div class="fmatch-loading">Loading matchup&#8230;</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const SEASON = '2026';
  const PROXY  = 'https://fantasy-baseball-kenoshaleague.onrender.com';

  const SEGMENTS = [
    { label: 'Segment 1', weeks: [1,2,3],    playoffs: false },
    { label: 'Segment 2', weeks: [4,5,6],    playoffs: false },
    { label: 'Segment 3', weeks: [7,8,9],    playoffs: false },
    { label: 'Segment 4', weeks: [10,11,12], playoffs: false },
    { label: 'Segment 5', weeks: [13,14,15], playoffs: false },
    { label: 'Segment 6', weeks: [16,17,18], playoffs: false },
    { label: 'Segment 7', weeks: [19,20,21], playoffs: true  },
  ];

  let globalData  = null;
  let teamMap     = {};
  let rosterMap   = {};
  let currentWeek = 1;
  let liveWeek    = 1;
  let maxWeek     = 1;

  const TAB_ORDER = ['scoreboard','standings','segments','mlblive'];
  let currentTabIndex = 0;

  // ── UTILS ──────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function setStatus(msg, isErr) {
    const el = document.getElementById('status-msg');
    el.innerHTML = msg;
    el.className = 'status-msg' + (isErr ? ' error' : '');
  }
  function fmtPts(n) { return Math.round(Number(n)).toString(); }
  function pct(w, l) {
    const t = w + l;
    return t > 0 ? (w/t).toFixed(3).replace(/^0/,'') : '.000';
  }

  // ── TABS ───────────────────────────────────────────────────────
  async function switchTab(tab) {
    currentTabIndex = TAB_ORDER.indexOf(tab);
    TAB_ORDER.forEach((t, i) => {
      document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
      document.querySelectorAll('.tab-btn')[i].classList.toggle('active', t === tab);
    });
    if (tab === 'mlblive') {
      if (!mlbLoaded) {
        // First open — load games first, then matchup so box scores are ready
        await loadMlb(true);
        renderMiniMatchupStrip();
        loadFantasyMatchup();
      } else {
        renderMiniMatchupStrip();
        loadFantasyMatchup();
      }
    }
  }

  // ── WEEK NAV ───────────────────────────────────────────────────
  function changeWeek(d) {
    const nw = currentWeek + d;
    if (nw < 1 || nw > maxWeek) return;
    currentWeek = nw;
    renderScoreboard();
  }

  // Native touch panning handled by browser.

  // ── LOAD ───────────────────────────────────────────────────────
  async function loadAll() {
    setStatus('Connecting to proxy...', false);
    try {
      const r = await fetch(
        `${PROXY}/api/league/${SEASON}?view=mMatchup&view=mMatchupScore&view=mTeam&view=mSettings&view=mStatus`
      );
      if (!r.ok) throw new Error(`Proxy returned ${r.status}`);
      globalData = await r.json();

      const status   = globalData.status   || {};
      const teams    = globalData.teams    || [];
      const settings = globalData.settings || {};

      liveWeek    = status.currentMatchupPeriod ?? 1;
      currentWeek = liveWeek;
      maxWeek     = liveWeek;

      document.getElementById('league-name').textContent = settings.name || 'Fantasy Baseball';

      teams.forEach(t => {
        const name = ((t.location||'') + ' ' + (t.nickname||'')).trim() || t.name || `Team ${t.id}`;
        teamMap[t.id] = {
          name, abbrev: t.abbrev || `T${t.id}`,
          wins:   t.record?.overall?.wins   ?? 0,
          losses: t.record?.overall?.losses ?? 0,
          ties:   t.record?.overall?.ties   ?? 0,
        };
      });

      // Fetch rosters — use team abbrev for tags
      try {
        const rr = await fetch(`${PROXY}/api/league/${SEASON}?view=mRoster`);
        if (rr.ok) {
          const rosterData = await rr.json();
          rosterMap = {};
          window._fullRoster = {};
          (rosterData.teams || []).forEach(t => {
            const label = teamMap[t.id]?.abbrev || `T${t.id}`;
            (t.roster?.entries || []).forEach(e => {
              const ppe    = e.playerPoolEntry || {};
              const name   = ppe?.player?.fullName || ppe?.fullName || '';
              const slotId = e.lineupSlotId ?? 16;
              if (name) {
                rosterMap[name.toLowerCase()] = label;
                window._fullRoster[name.toLowerCase()] = {
                  name, abbrev: label, slotId, teamId: t.id,
                  isBench: BENCH_SLOTS.has(slotId)
                };
              }
            });
          });
        }
      } catch(e) { console.warn('[Roster] failed:', e); }

      document.getElementById('status-panel').style.display = 'none';
      document.getElementById('tab-bar').style.display      = '';
      document.getElementById('main-content').style.display = 'block';

      renderScoreboard();
      renderStandings();
      renderSegments();
      loadFantasyMatchup();

    } catch(err) {
      let msg = err.message;
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) {
        msg = `Proxy isn't running.<br><br><code>python espn_proxy.py</code><br><br>Then click Retry.`;
      }
      setStatus(msg, true);
      const btn = document.createElement('button');
      btn.className = 'retry-btn'; btn.textContent = '↻ RETRY';
      btn.onclick = () => { btn.remove(); loadAll(); };
      document.getElementById('status-panel').appendChild(btn);
    }
  }

  // ── POINTS HELPER ──────────────────────────────────────────────
  function calcPointsForWeeks(weeks, includesLive) {
    const schedule = globalData?.schedule || [];
    const totals   = {};
    Object.keys(teamMap).forEach(id => { totals[id] = { pf: 0, pa: 0 }; });

    schedule.forEach(m => {
      if (!weeks.includes(m.matchupPeriodId)) return;
      const hId = m.home?.teamId, aId = m.away?.teamId;
      const isLiveWeek = m.matchupPeriodId === liveWeek;
      const useLive    = isLiveWeek && includesLive;
      const hPts = useLive ? +(m.home?.totalPointsLive ?? m.home?.totalPoints ?? 0) : +(m.home?.totalPoints ?? 0);
      const aPts = useLive ? +(m.away?.totalPointsLive ?? m.away?.totalPoints ?? 0) : +(m.away?.totalPoints ?? 0);
      if (totals[hId]) { totals[hId].pf += hPts; totals[hId].pa += aPts; }
      if (totals[aId]) { totals[aId].pf += aPts; totals[aId].pa += hPts; }
    });
    return totals;
  }

  // ── SCOREBOARD ─────────────────────────────────────────────────
  function renderScoreboard() {
    const schedule = globalData?.schedule || [];
    const isLive   = currentWeek === liveWeek;

    document.getElementById('week-nav-label').textContent = `Week ${currentWeek} · ${SEASON}`;
    document.getElementById('live-badge').style.display   = isLive ? '' : 'none';
    document.getElementById('btn-prev').disabled = currentWeek <= 1;
    document.getElementById('btn-next').disabled = currentWeek >= maxWeek;

    const matchups = schedule.filter(m => m.matchupPeriodId === currentWeek);
    const list     = document.getElementById('matchup-list');
    list.innerHTML = '';

    if (!matchups.length) {
      list.innerHTML = `<div style="text-align:center;padding:28px;font-family:'Special Elite',cursive;color:var(--muted);grid-column:1/-1">No matchups for Week ${currentWeek}.</div>`;
    } else {
      matchups.forEach(m => {
        const hId  = m.home?.teamId, aId = m.away?.teamId;
        const hT   = teamMap[hId] || { name:`Team ${hId}`, wins:0, losses:0, ties:0 };
        const aT   = teamMap[aId] || { name:`Team ${aId}`, wins:0, losses:0, ties:0 };
        const hPts = isLive ? +(m.home?.totalPointsLive ?? m.home?.totalPoints ?? 0) : +(m.home?.totalPoints ?? 0);
        const aPts = isLive ? +(m.away?.totalPointsLive ?? m.away?.totalPoints ?? 0) : +(m.away?.totalPoints ?? 0);
        const hWin = hPts > aPts, aWin = aPts > hPts;
        const isFinal = m.winner && m.winner !== 'UNDECIDED';
        const rec = t => `${t.wins}-${t.losses}${t.ties>0?'-'+t.ties:''}`;
        const badgeHtml = isFinal
          ? `<span class="matchup-status-badge badge-final">FINAL</span>`
          : `<span class="matchup-status-badge badge-live">LIVE</span>`;

        const card = document.createElement('div');
        card.className = 'matchup-card';
        card.innerHTML = `
          <div class="matchup-inner">
            <div class="team-row">
              <div><div class="team-name">${esc(hT.name)}</div><div class="team-record">${rec(hT)}</div></div>
              <div class="team-score ${hWin?'winning':aWin?'losing':''}">${fmtPts(hPts)}</div>
            </div>
            <div class="matchup-divider">
              <span class="vs-badge">VS</span>
              ${badgeHtml}
            </div>
            <div class="team-row">
              <div><div class="team-name">${esc(aT.name)}</div><div class="team-record">${rec(aT)}</div></div>
              <div class="team-score ${aWin?'winning':hWin?'losing':''}">${fmtPts(aPts)}</div>
            </div>
          </div>`;
        list.appendChild(card);
      });
    }
    renderStrip('bottom-strip', calcPointsForWeeks(Array.from({length: maxWeek}, (_,i) => i+1), true));
  }

  // ── STANDINGS ──────────────────────────────────────────────────
  function renderStandings() {
    const allWeeks = Array.from({length: maxWeek}, (_,i) => i+1);
    const totals   = calcPointsForWeeks(allWeeks, true);
    const withId   = Object.entries(teamMap).map(([id, t]) => ({
      id, ...t, pf: totals[id]?.pf ?? 0, pa: totals[id]?.pa ?? 0
    })).sort((a,b) => {
      if (b.wins !== a.wins) return b.wins - a.wins;
      const ap = a.wins/(a.wins+a.losses||1), bp = b.wins/(b.wins+b.losses||1);
      if (Math.abs(bp-ap) > 0.001) return bp-ap;
      return b.pf - a.pf;
    });

    const cutline = Math.ceil(withId.length / 2);
    const body    = document.getElementById('standings-body');
    body.innerHTML = '';

    withId.forEach((t, i) => {
      if (i === cutline) {
        const div = document.createElement('tr');
        div.className = 'table-divider';
        div.innerHTML = '<td colspan="8"></td>';
        body.appendChild(div);
      }
      const diff    = t.pf - t.pa;
      const diffStr = diff >= 0 ? '+' + Math.round(diff) : Math.round(diff).toString();
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${i+1}</td>
        <td>${esc(t.name)}</td>
        <td class="rec">${t.wins}</td>
        <td class="rec">${t.losses}</td>
        <td class="pct">${pct(t.wins,t.losses)}</td>
        <td class="pts">${fmtPts(t.pf)}</td>
        <td class="pts">${fmtPts(t.pa)}</td>
        <td class="diff ${diff>=0?'pos':'neg'}">${diffStr}</td>`;
      body.appendChild(row);
    });
    renderStrip('bottom-strip-2', totals);
  }

  // ── SEGMENTS ───────────────────────────────────────────────────
  function renderSegments() {
    const grid = document.getElementById('segment-grid');
    grid.innerHTML = '';

    SEGMENTS.forEach((seg, si) => {
      const activeWeeks = seg.weeks.filter(w => w <= maxWeek);
      const hasAny      = activeWeeks.length > 0;
      const isComplete  = seg.weeks.every(w => w < liveWeek);
      const isCurrent   = seg.weeks.includes(liveWeek);
      const totals      = hasAny ? calcPointsForWeeks(activeWeeks, true) : {};
      const ranked      = Object.entries(teamMap).map(([id, t]) => ({
        id, ...t, pf: totals[id]?.pf ?? 0, pa: totals[id]?.pa ?? 0,
      })).sort((a,b) => b.pf - a.pf);
      const winner = isComplete && ranked.length ? ranked[0] : null;

      let statusLabel = '';
      if (!hasAny)        statusLabel = 'UPCOMING';
      else if (isCurrent) statusLabel = `WEEKS ${activeWeeks[0]}–${liveWeek} IN PROGRESS`;
      else if (isComplete)statusLabel = `WEEKS ${seg.weeks[0]}–${seg.weeks[seg.weeks.length-1]} · COMPLETE`;

      const block = document.createElement('div');
      block.className = 'segment-block';
      block.innerHTML = `
        <div class="segment-header">
          <div><span class="segment-label">${esc(seg.label)}${seg.playoffs ? ' — Playoffs' : ''}</span></div>
          <div style="text-align:right">
            ${winner ? `<div class="segment-winner-crown">★ ${esc(winner.name)}</div>` : ''}
            <div class="segment-weeks">${statusLabel}</div>
          </div>
        </div>`;

      if (!hasAny) {
        const up = document.createElement('div');
        up.className = 'segment-incomplete';
        up.textContent = `Starts Week ${seg.weeks[0]}`;
        block.appendChild(up);
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'segment-table-wrap';
        wrap.innerHTML = `
          <table class="data-table" style="margin-top:10px">
            <thead><tr>
              <th>#</th><th>Team</th>
              ${activeWeeks.map(w=>`<th>WK ${w}</th>`).join('')}
              <th>TOTAL PF</th><th>TOTAL PA</th>
            </tr></thead>
            <tbody id="seg-body-${si}"></tbody>
          </table>`;
        block.appendChild(wrap);

        const byWeek = {};
        activeWeeks.forEach(w => {
          const wt = calcPointsForWeeks([w], w === liveWeek);
          Object.entries(wt).forEach(([id, v]) => {
            if (!byWeek[id]) byWeek[id] = {};
            byWeek[id][w] = v.pf;
          });
        });

        setTimeout(() => {
          const tbody = document.getElementById(`seg-body-${si}`);
          if (!tbody) return;
          ranked.forEach((t, ri) => {
            const isWinner = winner && t.id === winner.id;
            const row = document.createElement('tr');
            if (isWinner) row.className = 'winner-row';
            row.innerHTML = `
              <td>${ri+1}${isWinner?' ★':''}</td>
              <td>${esc(t.name)}</td>
              ${activeWeeks.map(w=>`<td class="pts">${(byWeek[t.id]?.[w]??0)>0?fmtPts(byWeek[t.id][w]):'—'}</td>`).join('')}
              <td class="pts">${fmtPts(t.pf)}</td>
              <td class="pts">${fmtPts(t.pa)}</td>`;
            tbody.appendChild(row);
          });
        }, 0);
      }
      grid.appendChild(block);
    });

    renderStrip('bottom-strip-3', calcPointsForWeeks(Array.from({length: maxWeek}, (_,i) => i+1), true));
  }

  // ── BOTTOM STRIP ───────────────────────────────────────────────
  function renderStrip(id, totals) {
    const ranked = Object.entries(teamMap).map(([tid, t]) => ({
      ...t, pf: totals[tid]?.pf ?? 0
    })).sort((a,b) => b.pf - a.pf);
    document.getElementById(id).innerHTML = ranked.map((t, i) => `
      <div class="strip-item">
        <div class="strip-rank">${i+1}</div>
        <div class="strip-name">${esc(t.abbrev)}</div>
        <div class="strip-record">${fmtPts(t.pf)} PF</div>
      </div>`).join('');
  }

  // ══════════════════════════════════════════════════════════════
  // ── MLB LIVE ─────────────────────────────────────────────────
  // ══════════════════════════════════════════════════════════════
  let mlbLoaded    = false;
  let mlbGames     = [];
  let mlbExpanded  = {};
  let mlbRefreshTm = null;
  const MLB_API    = 'https://statsapi.mlb.com';

  // ── FANTASY MATCHUP ────────────────────────────────────────────
  const MY_TEAM_ID = 1;
  let fMatchupData = null;

  function buildScoringMap() {
    const map = {};
    const items = globalData?.settings?.scoringSettings?.scoringItems || [];
    items.forEach(item => {
      const val = item.pointsOverrides?.[0]?.points ?? item.points ?? 0;
      map[item.statId] = item.isReverseItem ? -val : val;
    });
    return map;
  }

  function calcFantasyPts(mlbStats, ispitcher, scoringMap) {
    if (!mlbStats || !scoringMap) return 0;
    let pts = 0;
    if (!ispitcher) {
      const h    = mlbStats.hits           ?? 0;
      const r    = mlbStats.runs           ?? 0;
      const rbi  = mlbStats.rbi            ?? 0;
      const bb   = mlbStats.baseOnBalls    ?? 0;
      const hbp  = mlbStats.hitByPitch     ?? 0;
      const sb   = mlbStats.stolenBases    ?? 0;
      const cs   = mlbStats.caughtStealing ?? 0;
      const so   = mlbStats.strikeOuts     ?? 0;
      const hr   = mlbStats.homeRuns       ?? 0;
      const dbl  = mlbStats.doubles        ?? 0;
      const trpl = mlbStats.triples        ?? 0;
      const tb   = h + dbl + 2*trpl + 3*hr;
      pts += (scoringMap[5]  ?? 0) * r;
      pts += (scoringMap[6]  ?? 0) * rbi;
      pts += (scoringMap[9]  ?? 0) * hr;
      pts += (scoringMap[7]  ?? 0) * dbl;
      pts += (scoringMap[8]  ?? 0) * trpl;
      pts += (scoringMap[1]  ?? 0) * h;
      pts += (scoringMap[11] ?? 0) * bb;
      pts += (scoringMap[12] ?? 0) * hbp;
      pts += (scoringMap[14] ?? 0) * sb;
      pts += (scoringMap[15] ?? 0) * cs;
      pts += (scoringMap[17] ?? 0) * so;
      pts += (scoringMap[10] ?? 0) * tb;
    } else {
      const ipRaw  = String(mlbStats.inningsPitched ?? '0').split('.');
      const ip     = (parseInt(ipRaw[0])||0) + (parseInt(ipRaw[1])||0)/3;
      const er  = mlbStats.earnedRuns    ?? 0;
      const k   = mlbStats.strikeOuts   ?? 0;
      const bb  = mlbStats.baseOnBalls  ?? 0;
      const w   = mlbStats.wins         ?? 0;
      const l   = mlbStats.losses       ?? 0;
      const sv  = mlbStats.saves        ?? 0;
      const hld = mlbStats.holds        ?? 0;
      const bs  = mlbStats.blownSaves   ?? 0;
      const cg  = mlbStats.completeGames?? 0;
      const sho = mlbStats.shutouts     ?? 0;
      const qs  = (ip >= 6 && er <= 3)  ? 1 : 0;
      pts += (scoringMap[19] ?? 0) * ip;
      pts += (scoringMap[23] ?? 0) * k;
      pts += (scoringMap[22] ?? 0) * bb;
      pts += (scoringMap[24] ?? 0) * er;
      pts += (scoringMap[25] ?? 0) * w;
      pts += (scoringMap[26] ?? 0) * l;
      pts += (scoringMap[27] ?? 0) * sv;
      pts += (scoringMap[28] ?? 0) * hld;
      pts += (scoringMap[29] ?? 0) * bs;
      pts += (scoringMap[32] ?? 0) * cg;
      pts += (scoringMap[33] ?? 0) * sho;
      pts += (scoringMap[41] ?? 0) * qs;
    }
    return Math.round(pts * 10) / 10;
  }

  // ESPN lineup slot IDs — confirmed for this league:
  // 0=C, 1=1B, 2=2B, 3=3B, 4=SS, 5=OF, 6=OF, 7=OF
  // 8=UTIL (first), 12=UTIL (second) ← ESPN reuses 12 for extra UTIL in some leagues
  // 9=SP, 10=SP, 11=SP, 13=SP, 14=SP (5 SP slots)
  // 15=RP (1 RP slot)
  // 16=BN, 17=IL
  // Desired display order: C,1B,2B,3B,SS,OF,OF,OF,UTIL,UTIL,SP,SP,SP,SP,SP,RP
  const SLOT_LABEL = {
    0:'C', 1:'1B', 2:'2B', 3:'3B', 4:'SS',
    5:'OF', 6:'OF', 7:'OF',
    8:'UTIL', 12:'UTIL',
    9:'SP', 10:'SP', 11:'SP', 13:'SP', 14:'SP',
    15:'RP',
    16:'BN', 17:'IL'
  };
  const SLOT_ORDER = {
    0:0, 1:1, 2:2, 3:3, 4:4,          // C 1B 2B 3B SS
    5:5, 6:6, 7:7,                      // OF OF OF
    8:8, 12:9,                          // UTIL UTIL
    9:10, 10:11, 11:12, 13:13, 14:14,  // SP SP SP SP SP
    15:15,                              // RP
    16:99, 17:100                       // BN IL
  };
  // Bench = slots 16 (BN) and 17 (IL) only
  const BENCH_SLOTS = new Set([16, 17]);

  function posLabel(slotId) {
    return SLOT_LABEL[slotId] ?? 'BN';
  }

  // Currently selected matchup team IDs (defaults to my matchup)
  let activeMatchupTeamA = MY_TEAM_ID;
  let activeMatchupTeamB = null; // resolved on first load
  // Cached today stats so we don't re-fetch boxscores on every panel switch
  let cachedTodayStatsMap = null;

  // Build and show the mini strip of all this week's matchups
  function renderMiniMatchupStrip() {
    const strip = document.getElementById('mini-matchup-strip');
    if (!strip || !globalData) return;

    const schedule = globalData.schedule || [];
    const matchups = schedule.filter(m => m.matchupPeriodId === liveWeek);
    if (!matchups.length) return;

    strip.innerHTML = '';
    strip.style.display = 'flex';

    matchups.forEach(m => {
      const hId  = m.home?.teamId, aId = m.away?.teamId;
      const hT   = teamMap[hId] || { abbrev:`T${hId}` };
      const aT   = teamMap[aId] || { abbrev:`T${aId}` };
      const hPts = +(m.home?.totalPointsLive ?? m.home?.totalPoints ?? 0);
      const aPts = +(m.away?.totalPointsLive ?? m.away?.totalPoints ?? 0);
      const hWin = hPts > aPts, aWin = aPts > hPts;

      // Is this the active matchup?
      const isActive = (activeMatchupTeamA === hId || activeMatchupTeamA === aId);

      const pill = document.createElement('div');
      pill.className = `mini-matchup${isActive ? ' active' : ''}`;
      pill.innerHTML = `
        <div class="mini-team">
          <div class="mini-abbrev">${esc(hT.abbrev)}</div>
          <div class="mini-score ${hWin?'winning':aWin?'losing':''}">${Math.round(hPts)}</div>
        </div>
        <div class="mini-vs">vs</div>
        <div class="mini-team">
          <div class="mini-abbrev">${esc(aT.abbrev)}</div>
          <div class="mini-score ${aWin?'winning':hWin?'losing':''}">${Math.round(aPts)}</div>
        </div>`;
      pill.onclick = () => selectMatchup(hId, aId, pill);
      strip.appendChild(pill);
    });
  }

  // Called when a mini matchup pill is clicked
  async function selectMatchup(teamAId, teamBId, pillEl) {
    activeMatchupTeamA = teamAId;
    activeMatchupTeamB = teamBId;
    document.querySelectorAll('.mini-matchup').forEach(el => el.classList.remove('active'));
    if (pillEl) pillEl.classList.add('active');
    await loadFantasyMatchup(teamAId, teamBId);
  }

  async function loadFantasyMatchup(overrideTeamA, overrideTeamB) {
    const panel = document.getElementById('fantasy-matchup-panel');
    if (!panel || !globalData) return;

    try {
      const schedule = globalData.schedule || [];

      // Determine which matchup to show
      let matchup, teamAId, teamBId;

      if (overrideTeamA) {
        // Specific matchup selected from strip
        matchup = schedule.find(m =>
          m.matchupPeriodId === liveWeek &&
          ((m.home?.teamId === overrideTeamA && m.away?.teamId === overrideTeamB) ||
           (m.home?.teamId === overrideTeamB && m.away?.teamId === overrideTeamA))
        );
        teamAId = overrideTeamA;
        teamBId = overrideTeamB;
      } else {
        // Default: my matchup
        matchup = schedule.find(m =>
          m.matchupPeriodId === liveWeek &&
          (m.home?.teamId === MY_TEAM_ID || m.away?.teamId === MY_TEAM_ID)
        );
        teamAId = MY_TEAM_ID;
        teamBId = matchup
          ? (matchup.home?.teamId === MY_TEAM_ID ? matchup.away?.teamId : matchup.home?.teamId)
          : null;
        activeMatchupTeamA = teamAId;
        activeMatchupTeamB = teamBId;
      }

      if (!matchup) {
        panel.innerHTML = `<div class="fmatch-loading">No matchup found.</div>`;
        return;
      }

      const isHomeA = matchup.home?.teamId === teamAId;
      const aPts = +(matchup[isHomeA?'home':'away']?.totalPointsLive ?? matchup[isHomeA?'home':'away']?.totalPoints ?? 0);
      const bPts = +(matchup[isHomeA?'away':'home']?.totalPointsLive ?? matchup[isHomeA?'away':'home']?.totalPoints ?? 0);
      const aWin = aPts > bPts, bWin = bPts > aPts;

      const teamA = teamMap[teamAId] || { name:'Team A', abbrev:'A' };
      const teamB = teamMap[teamBId] || { name:'Team B', abbrev:'B' };

      const scoringMap = buildScoringMap();
      const roster     = window._fullRoster || {};
      const aStarters  = Object.values(roster).filter(p => p.teamId === teamAId && !p.isBench);
      const bStarters  = Object.values(roster).filter(p => p.teamId === teamBId && !p.isBench);

      if (!aStarters.length && !bStarters.length) {
        panel.innerHTML = `<div class="fmatch-loading">Roster not loaded yet — refresh.</div>`;
        return;
      }

      panel.innerHTML = `<div class="fmatch-loading">Fetching today's stats&#8230;</div>`;

      // Build (or reuse cached) today stats map from MLB boxscores
      if (!cachedTodayStatsMap) {
        cachedTodayStatsMap = {};
        await Promise.all(mlbGames.map(async game => {
          const pk    = game.gameData?.game?.pk;
          const state = game.gameData?.status?.abstractGameState;
          if (!pk || state === 'Preview') return;
          try {
            const res   = await fetch(`${MLB_API}/api/v1/game/${pk}/boxscore`);
            const data  = await res.json();
            const teams = data.teams || {};
            ['home','away'].forEach(side => {
              const batters  = teams[side]?.batters  || [];
              const pitchers = teams[side]?.pitchers || [];
              const players  = teams[side]?.players  || {};
              batters.forEach(id => {
                const p = players[`ID${id}`];
                if (!p?.person?.fullName) return;
                const gs = p?.gameStats?.batting || p?.stats?.batting || {};
                cachedTodayStatsMap[p.person.fullName.toLowerCase()] = { stats: gs, ispitcher: false };
              });
              pitchers.forEach(id => {
                const p = players[`ID${id}`];
                if (!p?.person?.fullName) return;
                const gs = p?.gameStats?.pitching || p?.stats?.pitching || {};
                cachedTodayStatsMap[p.person.fullName.toLowerCase()] = { stats: gs, ispitcher: true };
              });
            });
          } catch(e) {}
        }));
      }

      function enrichPlayers(starters) {
        return starters.map(p => {
          const mlb = cachedTodayStatsMap[p.name.toLowerCase()];
          const pts = mlb ? calcFantasyPts(mlb.stats, mlb.ispitcher, scoringMap) : null;
          return { ...p, pts, pos: posLabel(p.slotId), playing: !!mlb };
        }).sort((a, b) => (SLOT_ORDER[a.slotId] ?? 98) - (SLOT_ORDER[b.slotId] ?? 98));
      }

      const aEnriched = enrichPlayers(aStarters);
      const bEnriched = enrichPlayers(bStarters);
      fMatchupData = { aEnriched, bEnriched };
      renderMatchupPanel(teamA, teamB, aPts, bPts, aWin, bWin, aEnriched, bEnriched);

    } catch(err) {
      console.warn('[Fantasy Matchup]', err);
      if (panel) panel.innerHTML = `<div class="fmatch-loading" style="color:var(--dark-red)">Could not load matchup: ${err.message}</div>`;
    }
  }

  function renderMatchupPanel(myTeam, oppTeam, myPts, oppPts, myWin, oppWin, myPlayers, oppPlayers) {
    const panel = document.getElementById('fantasy-matchup-panel');
    if (!panel) return;

    function colRows(players) {
      if (!players.length) return `<div class="fmatch-loading" style="padding:8px">No data.</div>`;
      return players.map(p => {
        const hasGame = p.pts !== null;
        const ptsCls  = hasGame && p.pts > 0 ? 'positive' : 'zero';
        const nameCls = hasGame ? 'playing' : '';
        const ptsDisp = hasGame ? (p.pts > 0 ? p.pts.toFixed(1) : '0') : '—';
        return `
          <div class="fmatch-player-row-2col">
            <div class="fmatch-pos">${esc(p.pos)}</div>
            <div class="fmatch-pname ${nameCls}">${esc(p.name)}</div>
            <div class="fmatch-ppts ${ptsCls}">${ptsDisp}</div>
          </div>`;
      }).join('');
    }

    const myTodayPts  = myPlayers.filter(p=>p.pts!==null).reduce((s,p)=>s+(p.pts??0),0);
    const oppTodayPts = oppPlayers.filter(p=>p.pts!==null).reduce((s,p)=>s+(p.pts??0),0);

    panel.innerHTML = `
      <div class="fmatch-header">
        <div class="fmatch-title">⚾ Week ${liveWeek} Matchup</div>
        <div class="fmatch-score-bar">
          <div class="fmatch-score-team">
            <div class="fmatch-team-name">${esc(myTeam.name)}</div>
            <div class="fmatch-score ${myWin?'winning':oppWin?'losing':'tied'}">${Math.round(myPts)}</div>
          </div>
          <div class="fmatch-vs">vs</div>
          <div class="fmatch-score-team">
            <div class="fmatch-team-name">${esc(oppTeam.name)}</div>
            <div class="fmatch-score ${oppWin?'winning':myWin?'losing':'tied'}">${Math.round(oppPts)}</div>
          </div>
        </div>
      </div>
      <div class="fmatch-two-col">
        <div class="fmatch-col">
          <div class="fmatch-col-header">
            ${esc(myTeam.abbrev)}
            <span class="fmatch-col-today">+${myTodayPts.toFixed(1)}</span>
          </div>
          ${colRows(myPlayers)}
        </div>
        <div class="fmatch-col">
          <div class="fmatch-col-header">
            ${esc(oppTeam.abbrev)}
            <span class="fmatch-col-today">+${oppTodayPts.toFixed(1)}</span>
          </div>
          ${colRows(oppPlayers)}
        </div>
      </div>`;
  }

  function refreshMlb() { cachedTodayStatsMap = null; loadMlb(true); loadFantasyMatchup(); }

  async function loadMlb(showLoader = true) {
    const list = document.getElementById('mlb-game-list');
    if (showLoader) list.innerHTML = `<div class="mlb-no-games">Loading today's games…</div>`;

    try {
      const today   = new Date();
      const bball   = new Date(today.getTime() - 3 * 60 * 60 * 1000);
      const dateStr = `${bball.getFullYear()}-${String(bball.getMonth()+1).padStart(2,'0')}-${String(bball.getDate()).padStart(2,'0')}`;

      document.getElementById('mlb-date-label').textContent =
        today.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) + ' Games';

      const schedRes  = await fetch(`${MLB_API}/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore&language=en`);
      const schedData = await schedRes.json();
      const games     = schedData.dates?.[0]?.games || [];

      if (!games.length) {
        list.innerHTML = `<div class="mlb-no-games">No MLB games scheduled today.</div>`;
        document.getElementById('mlb-live-badge').style.display = 'none';
        return;
      }

      const hasLive = games.some(g => g.status?.abstractGameState === 'Live');
      document.getElementById('mlb-live-badge').style.display = hasLive ? '' : 'none';

      const freshGames = await Promise.all(games.map(async g => {
        const state = g.status?.abstractGameState;
        if (state !== 'Preview') {
          try {
            const lf   = await fetch(`${MLB_API}/api/v1.1/game/${g.gamePk}/feed/live?language=en`);
            const data = await lf.json();
            return data;
          } catch {}
        }
        return {
          gameData: {
            game:   { pk: g.gamePk },
            teams:  {
              home: { teamName: g.teams?.home?.team?.name || '?' },
              away: { teamName: g.teams?.away?.team?.name || '?' }
            },
            status: g.status
          },
          liveData: {
            linescore: {
              teams: {
                home: { runs: g.teams?.home?.score ?? '' },
                away: { runs: g.teams?.away?.score ?? '' }
              },
              currentInning: g.linescore?.currentInning || 0,
              inningHalf:    g.linescore?.inningHalf    || '',
              outs:          g.linescore?.outs           || 0
            },
            plays: {}
          }
        };
      }));

      mlbGames  = freshGames;
      mlbLoaded = true;

      const order  = { 'Live': 0, 'Preview': 1, 'Final': 2 };
      const sorted = [...mlbGames].sort((a,b) =>
        (order[a.gameData?.status?.abstractGameState]??3) - (order[b.gameData?.status?.abstractGameState]??3)
      );

      if (showLoader || list.children.length === 0) {
        list.innerHTML = '';
        sorted.forEach(game => list.appendChild(buildMlbGameCard(game)));
      } else {
        const existingPks = new Set([...list.querySelectorAll('.mlb-game-card[id]')].map(el => el.id.replace('mlb-card-','')));
        const newPks      = new Set(sorted.map(g => String(g.gameData?.game?.pk)));
        existingPks.forEach(pk => { if (!newPks.has(pk)) document.getElementById(`mlb-card-${pk}`)?.remove(); });
        sorted.forEach(game => {
          const pk       = String(game.gameData?.game?.pk);
          const existing = document.getElementById(`mlb-card-${pk}`);
          const newCard  = buildMlbGameCard(game);
          if (!existing) {
            list.appendChild(newCard);
          } else {
            const wasExpanded = mlbExpanded[pk];
            existing.className = newCard.className;
            existing.innerHTML = newCard.innerHTML;
            if (wasExpanded) {
              const wrap = existing.querySelector('.mlb-pitch-log-wrap');
              const hint = existing.querySelector('.mlb-expand-hint');
              if (wrap) { wrap.style.transition='none'; wrap.classList.add('open'); }
              if (hint) hint.textContent = '▴ CLOSE';
              requestAnimationFrame(() => { if (wrap) wrap.style.transition=''; });
            }
          }
        });
      }

      if (mlbRefreshTm) clearTimeout(mlbRefreshTm);
      if (hasLive) {
        mlbRefreshTm = setTimeout(() => { cachedTodayStatsMap = null; loadMlb(false); }, 15000);
        setTimeout(() => { renderMiniMatchupStrip(); loadFantasyMatchup(); }, 60000);
      }

    } catch(err) {
      if (showLoader) list.innerHTML = `<div class="mlb-no-games" style="color:var(--dark-red)">Error: ${esc(err.message)}</div>`;
      if (mlbRefreshTm) clearTimeout(mlbRefreshTm);
      mlbRefreshTm = setTimeout(() => loadMlb(false), 30000);
    }
  }

  function fantasyTag(playerName) {
    if (!playerName) return '';
    const abbrev = rosterMap[playerName.toLowerCase()];
    return abbrev ? `<span class="mlb-roster-tag">${esc(abbrev)}</span>` : '';
  }

  function buildMlbGameCard(game) {
    const gd     = game.gameData || {};
    const ld     = game.liveData || {};
    const state  = gd.status?.abstractGameState || 'Preview';
    const detail = gd.status?.detailedState     || 'Scheduled';
    const pk     = gd.game?.pk;
    const isLive = state === 'Live';
    const isFinal= state === 'Final';

    const homeTeam = gd.teams?.home?.teamName || gd.teams?.home?.team?.name || '?';
    const awayTeam = gd.teams?.away?.teamName || gd.teams?.away?.team?.name || '?';

    const ls    = ld.linescore || {};
    const homeR = ls.teams?.home?.runs ?? (isFinal||isLive ? 0 : '');
    const awayR = ls.teams?.away?.runs ?? (isFinal||isLive ? 0 : '');
    const inning      = ls.currentInning || 0;
    const inningHalf  = ls.inningHalf    || '';
    const inningArrow = inningHalf === 'Top' ? '▲' : '▼';
    const homeWin = typeof homeR==='number' && typeof awayR==='number' && homeR > awayR;
    const awayWin = typeof homeR==='number' && typeof awayR==='number' && awayR > homeR;

    const offense     = ld.linescore?.offense || {};
    const plays       = ld.plays              || {};
    const currentPlay = plays.currentPlay     || {};
    const pitchData   = currentPlay.playEvents|| [];
    const matchup     = currentPlay.matchup   || {};
    const pitcher     = matchup.pitcher?.fullName || '';
    const batter      = matchup.batter?.fullName  || '';

    const count   = currentPlay.count || ls;
    const balls   = count.balls   ?? 0;
    const strikes = count.strikes ?? 0;
    const outs    = ls.outs       ?? 0;

    const pitches  = pitchData.filter(e => e.type==='pitch' || e.isPitch);
    const allPlays = plays.allPlays || [];

    let inningStr = '';
    if (isLive && inning > 0) inningStr = `${inningArrow} ${inning}${inningOrdinal(inning)}`;
    else if (isFinal)         inningStr = inning > 9 ? `F/${inning}` : 'Final';
    else                      inningStr = detail;

    const cardClass = isLive ? 'mlb-game-card live-game' : isFinal ? 'mlb-game-card final-game' : 'mlb-game-card';
    const expanded  = mlbExpanded[pk] || false;

    const card = document.createElement('div');
    card.className = cardClass;
    card.id = `mlb-card-${pk}`;
    card.innerHTML = `
      <div class="mlb-game-header" onclick="toggleMlbExpand(${pk})">
        <div class="mlb-teams">
          <div class="mlb-team-row">
            <div class="mlb-team-name">${esc(awayTeam)}${isLive&&inningHalf==='Top'?' <span class="arrow">▶</span>':''}</div>
            <div class="mlb-team-score ${awayWin?'winning':homeWin?'losing':''}">${awayR!==''?awayR:'—'}</div>
          </div>
          <div class="mlb-divider"></div>
          <div class="mlb-team-row">
            <div class="mlb-team-name">${esc(homeTeam)}${isLive&&inningHalf==='Bottom'?' <span class="arrow">▶</span>':''}</div>
            <div class="mlb-team-score ${homeWin?'winning':awayWin?'losing':''}">${homeR!==''?homeR:'—'}</div>
          </div>
        </div>
        <div class="mlb-status-area">
          <div class="mlb-inning-badge ${isLive?'live':''}">${esc(inningStr)}</div>
          ${isLive ? buildDiamond(!!offense.first, !!offense.second, !!offense.third) : ''}
          ${isLive ? buildCountOuts(balls, strikes, outs) : ''}
        </div>
      </div>
      ${isLive&&(pitcher||batter) ? `
        <div class="mlb-atbat-strip">
          <div class="mlb-atbat-row">
            <span class="mlb-player-label">P</span>
            <span class="mlb-player-name">${esc(pitcher||'—')}</span>
            ${fantasyTag(pitcher)}
          </div>
          <div class="mlb-atbat-row">
            <span class="mlb-player-label">AB</span>
            <span class="mlb-player-name">${esc(batter||'—')}</span>
            ${fantasyTag(batter)}
          </div>
        </div>` : ''}
      ${isLive||isFinal ? `<div class="mlb-expand-hint" id="hint-${pk}">${expanded?'▴ CLOSE':'▾ PITCHES'}</div>` : ''}
      <div class="mlb-pitch-log-wrap ${expanded?'open':''}" id="pitchlog-${pk}">
        <div class="mlb-pitch-log">
          <div class="mlb-pitch-log-title">${esc(awayTeam)} @ ${esc(homeTeam)}</div>
          ${buildPitchLog(pitches, allPlays)}
        </div>
      </div>`;
    return card;
  }

  function toggleMlbExpand(pk) {
    mlbExpanded[pk] = !mlbExpanded[pk];
    const wrap = document.getElementById(`pitchlog-${pk}`);
    if (wrap) wrap.classList.toggle('open', mlbExpanded[pk]);
    const hint = document.getElementById(`hint-${pk}`);
    if (hint) hint.textContent = mlbExpanded[pk] ? '▴ CLOSE' : '▾ PITCHES';
  }

  function inningOrdinal(n) {
    return n===1?'st':n===2?'nd':n===3?'rd':'th';
  }

  function buildDiamond(first, second, third) {
    const f=first?'#d4a017':'none', s=second?'#d4a017':'none', t=third?'#d4a017':'none', stroke='#8b6914';
    return `<div class="mlb-diamond"><svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <rect x="17" y="3"  width="10" height="10" rx="1.5" fill="${s}" stroke="${stroke}" stroke-width="1.5" transform="rotate(45 22 8)"/>
      <rect x="3"  y="17" width="10" height="10" rx="1.5" fill="${t}" stroke="${stroke}" stroke-width="1.5" transform="rotate(45 8 22)"/>
      <rect x="31" y="17" width="10" height="10" rx="1.5" fill="${f}" stroke="${stroke}" stroke-width="1.5" transform="rotate(45 36 22)"/>
      <polygon points="22,36 18,40 22,44 26,40" fill="white" stroke="${stroke}" stroke-width="1.5"/>
    </svg></div>`;
  }

  function buildCountOuts(balls, strikes, outs) {
    let b='', s='', o='';
    for(let i=0;i<4;i++) b+=`<span class="mlb-dot ${i<balls?'on':''}"></span>`;
    for(let i=0;i<3;i++) s+=`<span class="mlb-dot ${i<strikes?'on':''}"></span>`;
    for(let i=0;i<3;i++) o+=`<span class="mlb-dot ${i<outs?'out-on':''}"></span>`;
    return `<div class="mlb-count-outs">
      <div class="mlb-count-row"><span class="mlb-count-label">B</span>${b}</div>
      <div class="mlb-count-row"><span class="mlb-count-label">S</span>${s}</div>
      <div class="mlb-count-row"><span class="mlb-count-label">O</span>${o}</div>
    </div>`;
  }

  function buildPitchLog(pitches, allPlays) {
    const entries = pitches.length ? pitches : (allPlays[allPlays.length-1]?.playEvents||[]).filter(e=>e.isPitch);
    if (!entries.length) return `<div style="font-family:'Special Elite',cursive;font-size:11px;color:var(--muted);padding:4px 0">No pitch data yet.</div>`;
    return entries.map((p,i) => {
      const desc  = p.details?.description || p.details?.type?.description || '—';
      const speed = p.pitchData?.startSpeed ? Math.round(p.pitchData.startSpeed)+' mph' : '';
      const b=p.count?.balls??'?', s=p.count?.strikes??'?';
      const isStrike=/strike|foul|swing/i.test(desc);
      const isBall  =/ball/i.test(desc)&&!isStrike;
      const isHit   =/hit|single|double|triple|homer|home run/i.test(desc);
      const cls = isHit?'tag-hit':isStrike?'tag-strike':isBall?'tag-ball':'tag-out';
      return `<div class="mlb-pitch-entry">
        <div class="mlb-pitch-num">${i+1}</div>
        <div class="mlb-pitch-desc ${cls}">${esc(desc)}</div>
        <div class="mlb-pitch-count">${b}-${s}</div>
        <div class="mlb-pitch-speed">${esc(speed)}</div>
      </div>`;
    }).join('');
  }

  loadAll();
</script>
